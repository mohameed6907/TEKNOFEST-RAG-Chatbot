version: "3.8"

services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teknofest-rag-chatbot
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist RAG indexes across container restarts
      - rag_data:/app/RAG/chroma_local_docs
      - rag_site_data:/app/RAG/chroma_teknofest_site
      # Mount local documents (optional: add your PDFs/DOCX/TXT/MD here)
      - ./RAG/raw:/app/RAG/raw
    restart: unless-stopped

volumes:
  rag_data:
  rag_site_data:
